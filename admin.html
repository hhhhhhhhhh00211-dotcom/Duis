<div style="position:fixed;top:10px;right:10px;background:#fff;padding:15px;box-shadow:0 0 10px #ccc;border-radius:10px;z-index:9999">
  <h3>➕ إضافة منتج</h3>

  <input id="name" placeholder="اسم المنتج"><br><br>
  <input id="price" placeholder="السعر"><br><br>
  <input id="img" placeholder="رابط الصورة"><br><br>

  <button onclick="addProduct()">إضافة</button>
</div>

<script>
function addProduct(){
  let products = JSON.parse(localStorage.getItem("products") || "[]");

  let newProduct = {
    name: document.getElementById("name").value,
    price: document.getElementById("price").value,
    img: document.getElementById("img").value
  };

  products.push(newProduct);
  localStorage.setItem("products", JSON.stringify(products));

  alert("تمت الإضافة ✅");
}
</script>
